name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required to mint an OIDC token for npm

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    environment: npm-publish   # binds this job to the approval-gated env
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Pin npm to a version with OIDC trusted publishing support
        # Node 22.x ships with npm 10.9.x, which has provenance signing but
        # NOT the OIDC token exchange with npm's registry required for
        # trusted publishing (added in npm 11.5.1). Pin an exact minor to
        # keep the publish path deterministic across runs.
        run: npm install -g npm@11.10.0

      - name: Install dependencies (honor lockfile)
        run: npm ci

      - name: Sanity-check tag matches package.json version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag ${TAG} does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance
